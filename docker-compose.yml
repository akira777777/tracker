services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: tracker:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      DATABASE_URL: file:/app/data/prod.db
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in your environment}
      AUTH_SECRET: ${AUTH_SECRET:?Set AUTH_SECRET in your environment}
      IP_HASH_SALT: ${IP_HASH_SALT:?Set IP_HASH_SALT in your environment}
      ANALYTICS_RETENTION_DAYS: ${ANALYTICS_RETENTION_DAYS:-30}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    volumes:
      - tracker-data:/app/data

volumes:
  tracker-data:
